<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StrengthTrack">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>StrengthTrack</title>

  <link rel="stylesheet" href="/css/main.css?v=4">
  <link rel="stylesheet" href="/css/components.css?v=4">
  <link rel="stylesheet" href="/css/dashboard.css?v=4">
</head>
<body>
  <div id="navbar-mount"></div>
  <main id="app">
    <div class="loading-screen">
      <div class="loading-logo">
        <span class="loading-g5">STRENGTH</span>
        <span class="loading-sub">TRACK</span>
      </div>
      <div class="spinner"></div>
    </div>
  </main>

  <script type="module" src="/js/app.js?v=4"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
